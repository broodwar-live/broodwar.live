{% extends "base.html" %}
{% block title %}{{ section.title }}{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h1 class="text-2xl font-display mb-6">{{ section.title }}</h1>
  <div id="matches-app" data-api="{{ config.extra.api_base_url }}" data-lang="{{ lang }}">
    <p class="text-sm text-base-content/30">Loading matches...</p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/js/matches.js" defer></script>
{% endblock %}
