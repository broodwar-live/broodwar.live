{% extends "base.html" %}
{% block title %}{{ taxonomy.name | title }}{% endblock %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
  <h1 class="text-2xl font-display mb-6">{{ taxonomy.name | title }}</h1>
  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
    {% for term in terms %}
    <a href="{{ term.permalink }}" class="glass-card rounded-box px-4 py-3 glow-blue">
      <span class="text-sm font-medium">{{ term.name | title }}</span>
      <span class="text-[11px] text-base-content/25 ml-2">{{ term.pages | length }}</span>
    </a>
    {% endfor %}
  </div>
</div>
{% endblock %}
